<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BeerBro — Bar & Berărie, Florești</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --amber:#d98e22;
  --amber-bright:#f0a93f;
  --wood-dark:#241712;
  --wood:#3a2419;
  --cream:#f3e6cf;
  --foam:#f7efdd;
  --ink:#1a110d;
  --line: rgba(243,230,207,0.14);
  --radius: 2px;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

body{
  background:var(--wood-dark);
  color:var(--foam);
  font-family:'Work Sans', sans-serif;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  padding:18px 0;
  z-index:100;
  transition:.3s;
}

header.scrolled{
  background:rgba(26,17,13,0.95);
  border-bottom:1px solid var(--line);
}

.wrap{max-width:1100px;margin:auto;padding:0 20px;}

header .wrap{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-family:'Anton';
  font-size:22px;
}

nav{
  display:flex;
  gap:20px;
}

nav a{
  color:var(--cream);
  text-decoration:none;
  font-size:14px;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  padding-top:80px;
}

.hero h1{
  font-family:'Anton';
  font-size:60px;
  line-height:1;
}

.stroke{
  color:transparent;
  -webkit-text-stroke:2px var(--amber-bright);
}

/* BUTTON */
.btn{
  display:inline-block;
  padding:12px 20px;
  background:var(--amber-bright);
  color:#000;
  text-decoration:none;
  margin-top:10px;
}

/* SECTIONS */
section{
  padding:80px 0;
}

/* MENU */
.menu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.menu-card{
  background:#1b120d;
  padding:20px;
  border:1px solid var(--line);
}

/* HOURS */
.hours-row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid var(--line);
}

.today{
  color:var(--amber-bright);
  font-weight:bold;
}

/* BUSY CHART */
.busy-chart{
  display:flex;
  align-items:flex-end;
  gap:5px;
  height:120px;
  margin-top:20px;
}

.busy-bar{
  flex:1;
  background:var(--line);
}

.busy-bar.peak{
  background:var(--amber-bright);
}

/* CONTACT */
input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  background:transparent;
  border:1px solid var(--line);
  color:white;
}

button{
  padding:10px 15px;
  background:var(--amber-bright);
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header id="header">
  <div class="wrap">
    <div class="logo">🍺 BEERBRO</div>
    <nav>
      <a href="#top">Acasă</a>
      <a href="#despre">Despre</a>
      <a href="#meniu">Meniu</a>
      <a href="#program">Program</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>
</header>

<section class="hero" id="top">
  <div class="wrap">
    <div>
      <h1>BEM<br>BERE<br><span class="stroke">BUNĂ</span></h1>
      <p>Bar local în Florești — bere rece, atmosferă bună.</p>
      <a class="btn" href="#meniu">Vezi meniul</a>
    </div>
  </div>
</section>

<section id="despre">
  <div class="wrap">
    <h2>Despre noi</h2>
    <p>BeerBro este un bar local cu atmosferă relaxată.</p>
  </div>
</section>

<section id="meniu">
  <div class="wrap">
    <h2>Meniu</h2>

    <div class="menu-grid">
      <div class="menu-card">Blondă Craft - 22 MDL</div>
      <div class="menu-card">IPA Bro - 28 MDL</div>
      <div class="menu-card">Dark Porter - 30 MDL</div>
    </div>
  </div>
</section>

<section id="program">
  <div class="wrap">
    <h2>Program</h2>

    <div id="hours"></div>

    <div class="busy-chart" id="busyChart"></div>
  </div>
</section>

<section id="contact">
  <div class="wrap">
    <h2>Contact</h2>

    <form id="form">
      <input placeholder="Nume" required>
      <input placeholder="Email" type="email" required>
      <textarea placeholder="Mesaj"></textarea>
      <button>Trimite</button>
    </form>

    <p id="msg"></p>
  </div>
</section>

<script>
// header scroll
window.addEventListener("scroll",()=>{
  document.getElementById("header")
  .classList.toggle("scrolled",window.scrollY>50);
});

// PROGRAM (auto generate)
const days=["luni","marți","miercuri","joi","vineri","sâmbătă","duminică"];
const today=new Date().getDay();

const hours=document.getElementById("hours");

days.forEach((d,i)=>{
  const div=document.createElement("div");
  div.className="hours-row"+(i===today?" today":"");
  div.innerHTML=`<span>${d}</span><span>10:00 - 22:00</span>`;
  hours.appendChild(div);
});

// BUSY CHART (clean)
const busy=[20,30,40,35,50,60,80,100,90,70];

const chart=document.getElementById("busyChart");

busy.forEach(v=>{
  const bar=document.createElement("div");
  bar.className="busy-bar"+(v===100?" peak":"");
  bar.style.height=v+"%";
  chart.appendChild(bar);
});

// form
document.getElementById("form").addEventListener("submit",e=>{
  e.preventDefault();
  document.getElementById("msg").textContent="Mesaj trimis!";
});
</script>

</body>
</html>
